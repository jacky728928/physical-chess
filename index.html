<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#769656">
<title>国际象棋</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #2b2b2b;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #eee;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
    }

    .wrap {
        width: 100%;
        min-height: 100vh;
        padding: 12px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .top {
        width: 100%;
        max-width: 520px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #3a3a3a;
        border-radius: 8px;
        padding: 10px 14px;
        box-sizing: border-box;
    }

    .turn {
        font-size: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 4px rgba(255,255,255,0.5);
        border: 1px solid #444;
    }

    .dot.black { background: #111; box-shadow: 0 0 4px rgba(255,255,255,0.15); border-color: #666; }

    .check {
        font-size: 13px;
        color: #ff8a80;
        font-weight: 700;
        display: none;
    }

    .check.active { display: inline; animation: blink 1s infinite; }

    @keyframes blink {
        50% { opacity: 0.4; }
    }

    .reset {
        background: #5a5a5a;
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
    }

    .reset:active { background: #7a7a7a; }

    .board {
        width: min(92vw, 520px);
        aspect-ratio: 1 / 1;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        border: 3px solid #5d4037;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .cell {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .cell.light { background: #f0d9b5; }
    .cell.dark { background: #b58863; }
    .cell.selected { background: #f7ec74 !important; }
    .cell.last { background: #dacb5a !important; }
    .cell.last.light { background: #e8d96a !important; }
    .cell.check { background: radial-gradient(circle, rgba(255,80,80,0.7) 0%, transparent 70%) !important; }

    .cell.can-move::after {
        content: '';
        position: absolute;
        width: 28%;
        height: 28%;
        border-radius: 50%;
        background: rgba(0,0,0,0.25);
    }

    .cell.can-capture::after {
        content: '';
        position: absolute;
        width: 90%;
        height: 90%;
        border-radius: 50%;
        border: 5px solid rgba(255,80,80,0.65);
        box-sizing: border-box;
    }

    .piece {
        width: 82%;
        height: 82%;
        display: block;
        filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.45));
        cursor: default;
    }

    .history {
        width: 100%;
        max-width: 520px;
        background: #3a3a3a;
        border-radius: 8px;
        padding: 10px;
        box-sizing: border-box;
        font-size: 13px;
        font-family: "Courier New", monospace;
        max-height: 120px;
        overflow-y: auto;
    }

    .history-title {
        color: #aaa;
        font-size: 11px;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .history-entry {
        display: inline-block;
        background: #4a4a4a;
        padding: 3px 6px;
        margin: 2px;
        border-radius: 4px;
        color: #ffe082;
    }

    .game-over {
        width: 100%;
        max-width: 520px;
        background: #4a3a1a;
        color: #ffe082;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        font-weight: 700;
        box-sizing: border-box;
        display: none;
    }

    .game-over.active { display: block; }

    .promo {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
    }

    .promo.active { display: flex; }

    .promo-box {
        background: #3a3a3a;
        padding: 20px;
        border-radius: 12px;
        display: flex;
        gap: 12px;
    }

    .promo-btn {
        width: 64px;
        height: 64px;
        background: #4a4a4a;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px;
        box-sizing: border-box;
    }

    .promo-btn:active { background: #6a6a3a; }

    .promo-btn svg { width: 100%; height: 100%; }

    @media (orientation: landscape) and (max-height: 600px) {
        .wrap { gap: 8px; padding: 6px; }
        .board { max-width: none; width: min(92vh, 60vh); }
        .history { max-height: 60px; font-size: 11px; }
    }
</style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <div class="turn">
            <span class="dot" id="turnDot"></span>
            <span id="turnText">白方</span>
        </div>
        <span class="check" id="checkEl">将军</span>
        <button class="reset" id="resetBtn">重开</button>
    </div>

    <div class="board" id="board"></div>

    <div class="game-over" id="gameOverEl"></div>

    <div class="history">
        <div class="history-title">走子记录</div>
        <div id="historyList"></div>
    </div>
</div>

<div class="promo" id="promoEl">
    <div class="promo-box" id="promoBox"></div>
</div>

<script>
(function() {
    'use strict';

    // ============ SVG 棋子 ============
    // 白棋：纯白底+纯黑线；黑棋：纯黑底+纯白线
    function svgPiece(piece) {
        const isWhite = piece === piece.toUpperCase();
        const fill   = isWhite ? '#ffffff' : '#000000';
        const stroke = isWhite ? '#000000' : '#ffffff';
        const accent = isWhite ? '#000000' : '#ffffff';
        const p = piece.toUpperCase();

        const head = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">';
        const tail = '</svg>';

        if (p === 'K') {
            return head + `
                <path fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"
                    d="M 22.5,12 L 26,18 L 31,18 L 27,22 L 29,28 L 22.5,24 L 16,28 L 18,22 L 14,18 L 19,18 Z"/>
                <rect x="13" y="29" width="19" height="4.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <path d="M 12,33.5 L 13,39 L 32,39 L 33,33.5 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="12.5" y="39" width="20" height="3.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="20.5" y="3.5" width="4" height="6.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="18" y="6" width="9" height="1.8" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
            ` + tail;
        }
        if (p === 'Q') {
            return head + `
                <path fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"
                    d="M 9,26 C 10.5,24.5 12,25 13,25.5 C 14,23.5 15.5,24 16.5,25.5 C 17.5,24 18.5,23.5 19.5,24 C 19.5,22.5 20.5,22 22.5,22 C 24.5,22 25.5,22.5 25.5,24 C 26.5,23.5 27.5,24 28.5,25.5 C 29.5,24 31,23.5 32,25.5 C 33,25 34.5,24.5 36,26 L 37,14 L 33.5,18.5 L 30.5,13 L 27,18.5 L 22.5,10 L 18,18.5 L 14.5,13 L 11.5,18.5 L 8,14 Z"/>
                <path d="M 8,27 C 8.5,27.5 9,27.5 11,27.5 C 12,27.5 13,27.5 14.5,27.5 C 15.5,27.5 16.5,27.5 18,27.5 C 19.5,27.5 20.5,27.5 22.5,27.5 C 24.5,27.5 25.5,27.5 27,27.5 C 28.5,27.5 29.5,27.5 30.5,27.5 C 32,27.5 33,27.5 34,27.5 C 35.5,27.5 36.5,27.5 37,27 L 36,31.5 L 9,31.5 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="11" y="31.5" width="23" height="3.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <path d="M 10,35 L 11,40 L 34,40 L 35,35 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="10.5" y="40" width="24" height="3" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <circle cx="9" cy="12.5" r="1.8" fill="${accent}"/>
                <circle cx="14.5" cy="11" r="1.8" fill="${accent}"/>
                <circle cx="22.5" cy="8" r="1.8" fill="${accent}"/>
                <circle cx="30.5" cy="11" r="1.8" fill="${accent}"/>
                <circle cx="36" cy="12.5" r="1.8" fill="${accent}"/>
            ` + tail;
        }
        if (p === 'R') {
            return head + `
                <path fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"
                    d="M 9,39 L 9,17 L 13,17 L 13,12 L 17,12 L 17,17 L 21,17 L 21,12 L 25,12 L 25,17 L 29,17 L 29,12 L 33,12 L 33,17 L 36,17 L 36,39 Z"/>
                <rect x="13" y="19.5" width="19" height="2.5" fill="${fill}" stroke="${stroke}" stroke-width="1"/>
                <rect x="13" y="33.5" width="19" height="2.5" fill="${fill}" stroke="${stroke}" stroke-width="1"/>
            ` + tail;
        }
        if (p === 'B') {
            return head + `
                <path fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"
                    d="M 22.5,8 C 19.5,8 18,10 18,12.5 C 18,14.5 19.5,16 20.5,16 L 20.5,19 C 16.5,20 13,23.5 13,28 C 13,30 13.5,31.5 14.5,32.5 L 13.5,34 L 31.5,34 L 30.5,32.5 C 31.5,31.5 32,30 32,28 C 32,23.5 28.5,20 24.5,19 L 24.5,16 C 25.5,16 27,14.5 27,12.5 C 27,10 25.5,8 22.5,8 Z"/>
                <circle cx="22.5" cy="12" r="1.8" fill="${accent}"/>
                <circle cx="20.5" cy="22" r="1.2" fill="${accent}"/>
                <circle cx="24.5" cy="22" r="1.2" fill="${accent}"/>
                <circle cx="19" cy="26" r="1.2" fill="${accent}"/>
                <circle cx="26" cy="26" r="1.2" fill="${accent}"/>
                <circle cx="22.5" cy="28" r="1.2" fill="${accent}"/>
                <rect x="12.5" y="34" width="20" height="3.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <path d="M 11.5,37.5 L 12.5,42 L 32.5,42 L 33.5,37.5 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="12" y="42" width="21" height="2.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
            ` + tail;
        }
        if (p === 'N') {
            return head + `
                <path fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"
                    d="M 22,11 C 19,12 17,14.5 16.5,18.5 L 12.5,19.5 C 11,20 10.5,21.5 10.8,23 L 9.5,29 L 9.5,34 L 35.5,34 L 34.5,29 C 33.5,26 31,24 29,22.5 C 28,21 27.5,20.5 27.5,19 L 26.5,16.5 L 25.5,13 C 24.5,11.5 23,11 22,11 Z"/>
                <circle cx="25.5" cy="15.5" r="1.8" fill="${accent}"/>
                <ellipse cx="27.5" cy="22.5" rx="1" ry="2" fill="${accent}"/>
                <rect x="12" y="34" width="21" height="3.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <path d="M 11,37.5 L 12,42 L 33,42 L 34,37.5 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="11.5" y="42" width="22" height="2.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
            ` + tail;
        }
        if (p === 'P') {
            return head + `
                <circle cx="22.5" cy="15.5" r="6" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <path d="M 15,34 C 15,30 18.5,28 21,28 L 24,28 C 26.5,28 30,30 30,34 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="13.5" y="34" width="18" height="3.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <path d="M 12.5,37.5 L 13.5,42 L 31.5,42 L 32.5,37.5 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
                <rect x="13" y="42" width="19" height="2.5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
            ` + tail;
        }
        return head + tail;
    }

    // ============ 游戏状态 ============
    let board = [];
    let turn = 'w';
    let selected = null;
    let validMoves = [];
    let history = [];
    let gameOver = false;
    let castling = { wK: true, wQ: true, bK: true, bQ: true };
    let enPassant = null;
    let lastMove = null;

    const FILES = ['a','b','c','d','e','f','g','h'];

    function initBoard() {
        board = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];
        turn = 'w';
        selected = null;
        validMoves = [];
        history = [];
        gameOver = false;
        castling = { wK: true, wQ: true, bK: true, bQ: true };
        enPassant = null;
        lastMove = null;
    }

    function colorOf(p) {
        if (!p) return null;
        return p === p.toUpperCase() ? 'w' : 'b';
    }

    function inBounds(r, c) { return r >= 0 && r < 8 && c >= 0 && c < 8; }

    function pseudoMoves(r, c) {
        const p = board[r][c];
        if (!p) return [];
        const color = colorOf(p);
        const enemy = color === 'w' ? 'b' : 'w';
        const type = p.toUpperCase();
        const moves = [];

        const add = (nr, nc, extra = {}) => {
            if (!inBounds(nr, nc)) return false;
            const target = board[nr][nc];
            if (target && colorOf(target) === color) return false;
            moves.push({ from: [r,c], to: [nr,nc], piece: p, captured: target, ...extra });
            return !target;
        };

        if (type === 'P') {
            const dir = color === 'w' ? -1 : 1;
            const startRow = color === 'w' ? 6 : 1;
            const promoRow = color === 'w' ? 0 : 7;
            if (inBounds(r + dir, c) && !board[r + dir][c]) {
                if (r + dir === promoRow) {
                    ['Q','R','B','N'].forEach(pp => moves.push({ from:[r,c], to:[r+dir,c], piece:p, captured:null, promotion: color==='w'?pp:pp.toLowerCase() }));
                } else {
                    moves.push({ from:[r,c], to:[r+dir,c], piece:p, captured:null });
                }
                if (r === startRow && !board[r + 2*dir][c]) {
                    moves.push({ from:[r,c], to:[r+2*dir,c], piece:p, captured:null, doubleStep:true });
                }
            }
            for (const dc of [-1, 1]) {
                const nr = r + dir, nc = c + dc;
                if (!inBounds(nr, nc)) continue;
                const target = board[nr][nc];
                if (target && colorOf(target) !== color) {
                    if (nr === promoRow) {
                        ['Q','R','B','N'].forEach(pp => moves.push({ from:[r,c], to:[nr,nc], piece:p, captured:target, promotion: color==='w'?pp:pp.toLowerCase() }));
                    } else {
                        moves.push({ from:[r,c], to:[nr,nc], piece:p, captured:target });
                    }
                }
                if (enPassant && enPassant[0] === nr && enPassant[1] === nc) {
                    moves.push({ from:[r,c], to:[nr,nc], piece:p, captured:board[r][nc], enPassant:true });
                }
            }
        }
        else if (type === 'N') {
            const ds = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
            for (const [dr, dc] of ds) add(r + dr, c + dc);
        }
        else if (type === 'B' || type === 'R' || type === 'Q') {
            const dirs = [];
            if (type === 'B' || type === 'Q') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
            if (type === 'R' || type === 'Q') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
            for (const [dr, dc] of dirs) {
                let nr = r + dr, nc = c + dc;
                while (inBounds(nr, nc)) {
                    const target = board[nr][nc];
                    if (!target) moves.push({ from:[r,c], to:[nr,nc], piece:p, captured:null });
                    else { if (colorOf(target) !== color) moves.push({ from:[r,c], to:[nr,nc], piece:p, captured:target }); break; }
                    nr += dr; nc += dc;
                }
            }
        }
        else if (type === 'K') {
            for (let dr = -1; dr <= 1; dr++)
                for (let dc = -1; dc <= 1; dc++)
                    if (dr || dc) add(r + dr, c + dc);
            const row = color === 'w' ? 7 : 0;
            if (r === row && c === 4) {
                const canK = color === 'w' ? castling.wK : castling.bK;
                const canQ = color === 'w' ? castling.wQ : castling.bQ;
                if (canK && !board[row][5] && !board[row][6] && board[row][7] && board[row][7].toUpperCase() === 'R') {
                    if (!isSquareAttacked(row, 4, enemy) && !isSquareAttacked(row, 5, enemy) && !isSquareAttacked(row, 6, enemy)) {
                        moves.push({ from:[r,c], to:[row,6], piece:p, captured:null, castle:'K' });
                    }
                }
                if (canQ && !board[row][1] && !board[row][2] && !board[row][3] && board[row][0] && board[row][0].toUpperCase() === 'R') {
                    if (!isSquareAttacked(row, 4, enemy) && !isSquareAttacked(row, 3, enemy) && !isSquareAttacked(row, 2, enemy)) {
                        moves.push({ from:[r,c], to:[row,2], piece:p, captured:null, castle:'Q' });
                    }
                }
            }
        }
        return moves;
    }

    function isSquareAttacked(r, c, byColor) {
        const dir = byColor === 'w' ? 1 : -1;
        for (const dc of [-1, 1]) {
            const pr = r + dir, pc = c + dc;
            if (inBounds(pr, pc)) { const p = board[pr][pc]; if (p && colorOf(p) === byColor && p.toUpperCase() === 'P') return true; }
        }
        const kn = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
        for (const [dr, dc] of kn) { const nr = r + dr, nc = c + dc; if (inBounds(nr, nc)) { const p = board[nr][nc]; if (p && colorOf(p) === byColor && p.toUpperCase() === 'N') return true; } }
        const rd = [[-1,0],[1,0],[0,-1],[0,1]];
        for (const [dr, dc] of rd) { let nr = r + dr, nc = c + dc; while (inBounds(nr, nc)) { const p = board[nr][nc]; if (p) { if (colorOf(p) === byColor && (p.toUpperCase()==='R' || p.toUpperCase()==='Q')) return true; break; } nr += dr; nc += dc; } }
        const bd = [[-1,-1],[-1,1],[1,-1],[1,1]];
        for (const [dr, dc] of bd) { let nr = r + dr, nc = c + dc; while (inBounds(nr, nc)) { const p = board[nr][nc]; if (p) { if (colorOf(p) === byColor && (p.toUpperCase()==='B' || p.toUpperCase()==='Q')) return true; break; } nr += dr; nc += dc; } }
        for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++) {
                if (!dr && !dc) continue;
                const nr = r + dr, nc = c + dc;
                if (inBounds(nr, nc)) { const p = board[nr][nc]; if (p && colorOf(p) === byColor && p.toUpperCase() === 'K') return true; }
            }
        return false;
    }

    function inCheck(color) {
        for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++) {
                const p = board[r][c];
                if (p && p.toUpperCase() === 'K' && colorOf(p) === color) return isSquareAttacked(r, c, color === 'w' ? 'b' : 'w');
            }
        return false;
    }

    function legalMoves(r, c) {
        const p = board[r][c];
        if (!p || colorOf(p) !== turn) return [];
        const pseudo = pseudoMoves(r, c);
        const legal = [];
        for (const m of pseudo) {
            const saved = cloneBoard(board);
            const savedEP = enPassant;
            const savedCast = {...castling};
            applyMove(m, true);
            if (!inCheck(turn)) legal.push(m);
            board = saved;
            enPassant = savedEP;
            castling = savedCast;
        }
        return legal;
    }

    function cloneBoard(b) { return b.map(row => row.slice()); }

    function allLegalMoves(color) {
        const savedTurn = turn;
        turn = color;
        const all = [];
        for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++) {
                if (board[r][c] && colorOf(board[r][c]) === color) all.push(...legalMoves(r, c));
            }
        turn = savedTurn;
        return all;
    }

    function applyMove(m, silent) {
        const [fr, fc] = m.from;
        const [tr, tc] = m.to;
        const p = board[fr][fc];
        const color = colorOf(p);
        board[fr][fc] = '';
        if (m.enPassant) board[fr][tc] = '';
        board[tr][tc] = m.promotion || p;
        if (m.castle === 'K') { board[tr][5] = board[tr][7]; board[tr][7] = ''; }
        else if (m.castle === 'Q') { board[tr][3] = board[tr][0]; board[tr][0] = ''; }
        if (p.toUpperCase() === 'K') { if (color === 'w') { castling.wK = false; castling.wQ = false; } else { castling.bK = false; castling.bQ = false; } }
        if (p.toUpperCase() === 'R') { if (color === 'w' && fr === 7) { if (fc === 0) castling.wQ = false; if (fc === 7) castling.wK = false; } if (color === 'b' && fr === 0) { if (fc === 0) castling.bQ = false; if (fc === 7) castling.bK = false; } }
        if (m.captured && m.captured.toUpperCase() === 'R') { const enemy = color === 'w' ? 'b' : 'w'; if (enemy === 'w' && tr === 7) { if (tc === 0) castling.wQ = false; if (tc === 7) castling.wK = false; } if (enemy === 'b' && tr === 0) { if (tc === 0) castling.bQ = false; if (tc === 7) castling.bK = false; } }
        if (m.doubleStep) enPassant = [(fr + tr) / 2, tc]; else enPassant = null;
        if (!silent) { turn = color === 'w' ? 'b' : 'w'; lastMove = { from: m.from, to: m.to }; }
    }

    function notation(m) {
        if (m.castle === 'K') return 'O-O';
        if (m.castle === 'Q') return 'O-O-O';
        const piece = m.piece.toUpperCase();
        const pieceStr = piece === 'P' ? '' : piece;
        const cap = m.captured || m.enPassant ? 'x' : '';
        const dest = FILES[m.to[1]] + (8 - m.to[0]);
        const promo = m.promotion ? '=' + m.promotion.toUpperCase() : '';
        if (piece === 'P' && (m.captured || m.enPassant)) return FILES[m.from[1]] + cap + dest + promo;
        return pieceStr + cap + dest + promo;
    }

    // ============ 渲染 ============
    const boardEl = document.getElementById('board');
    const turnDot = document.getElementById('turnDot');
    const turnText = document.getElementById('turnText');
    const checkEl = document.getElementById('checkEl');
    const historyList = document.getElementById('historyList');
    const gameOverEl = document.getElementById('gameOverEl');
    const resetBtn = document.getElementById('resetBtn');
    const promoEl = document.getElementById('promoEl');
    const promoBox = document.getElementById('promoBox');
    let pendingPromo = null;

    function render() {
        boardEl.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
                if (selected && selected[0] === r && selected[1] === c) cell.classList.add('selected');
                if (lastMove && ((lastMove.from[0]===r && lastMove.from[1]===c) || (lastMove.to[0]===r && lastMove.to[1]===c))) cell.classList.add('last');
                const vm = validMoves.find(m => m.to[0] === r && m.to[1] === c);
                if (vm) { if (vm.captured || vm.enPassant) cell.classList.add('can-capture'); else cell.classList.add('can-move'); }
                if (!gameOver && inCheck(turn)) {
                    for (let rr = 0; rr < 8; rr++)
                        for (let cc = 0; cc < 8; cc++) {
                            const p = board[rr][cc];
                            if (p && p.toUpperCase() === 'K' && colorOf(p) === turn && rr === r && cc === c) cell.classList.add('check');
                        }
                }
                const piece = board[r][c];
                if (piece) {
                    const pieceEl = document.createElement('div');
                    pieceEl.className = 'piece';
                    pieceEl.innerHTML = svgPiece(piece);
                    cell.appendChild(pieceEl);
                }
                cell.addEventListener('click', () => onCellClick(r, c));
                boardEl.appendChild(cell);
            }
        }
        turnDot.className = 'dot' + (turn === 'b' ? ' black' : '');
        turnText.textContent = turn === 'w' ? '白方' : '黑方';
        if (!gameOver && inCheck(turn)) checkEl.classList.add('active'); else checkEl.classList.remove('active');
        historyList.innerHTML = '';
        const pairs = [];
        for (let i = 0; i < history.length; i += 2) {
            const num = (i / 2) + 1;
            const w = history[i] || '';
            const b = history[i+1] || '';
            pairs.push(`${num}.${w}${b ? ' ' + b : ''}`);
        }
        pairs.forEach(p => { const el = document.createElement('span'); el.className = 'history-entry'; el.textContent = p; historyList.appendChild(el); });
        historyList.scrollLeft = historyList.scrollWidth;
    }

    function onCellClick(r, c) {
        if (gameOver || pendingPromo) return;
        if (selected) {
            const m = validMoves.find(mv => mv.to[0] === r && mv.to[1] === c);
            if (m) { if (m.promotion) { showPromoDialog(m); return; } doMove(m); return; }
            if (board[r][c] && colorOf(board[r][c]) === turn) { selected = [r, c]; validMoves = legalMoves(r, c); render(); return; }
            selected = null; validMoves = []; render(); return;
        }
        if (board[r][c] && colorOf(board[r][c]) === turn) { selected = [r, c]; validMoves = legalMoves(r, c); render(); }
    }

    function doMove(m) {
        applyMove(m, false);
        let note = notation(m);
        const opp = turn;
        if (inCheck(opp)) {
            const moves = allLegalMoves(opp);
            if (moves.length === 0) { note += '#'; gameOver = true; gameOverEl.textContent = (opp === 'w' ? '黑方' : '白方') + '将杀获胜！'; }
            else note += '+';
        } else {
            const moves = allLegalMoves(opp);
            if (moves.length === 0) { gameOver = true; gameOverEl.textContent = '逼和'; }
        }
        if (gameOver) gameOverEl.classList.add('active');
        history.push(note);
        selected = null; validMoves = [];
        render();
    }

    function showPromoDialog(m) {
        pendingPromo = m;
        const color = colorOf(m.piece);
        const choices = ['Q','R','B','N'];
        promoBox.innerHTML = '';
        choices.forEach(ch => {
            const btn = document.createElement('div');
            btn.className = 'promo-btn';
            btn.innerHTML = svgPiece(color === 'w' ? ch : ch.toLowerCase());
            btn.onclick = () => { m.promotion = color === 'w' ? ch : ch.toLowerCase(); pendingPromo = null; promoEl.classList.remove('active'); doMove(m); };
            promoBox.appendChild(btn);
        });
        promoEl.classList.add('active');
    }

    resetBtn.addEventListener('click', () => {
        if (!gameOver && history.length > 0) { if (!confirm('重新开始？')) return; }
        initBoard();
        gameOverEl.classList.remove('active');
        render();
    });

    initBoard();
    render();
})();
</script>
</body>
</html>
